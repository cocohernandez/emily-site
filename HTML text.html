<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emily Gonzalez — Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --cream: #f4ecdd;
      --cream-deep: #ebe0cb;
      --ink: #1e1813;
      --ink-soft: #4a3f35;
      --terracotta: #b74a28;
      --muted: #8a7a66;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Fraunces', Georgia, serif;
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* paper grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.09;
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 1;
    }

    /* soft radial warmth */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 70% 20%, rgba(183, 74, 40, 0.08), transparent 55%);
      pointer-events: none;
      z-index: 1;
    }

    .stage {
      position: relative;
      min-height: 100vh;
      padding: 1.75rem 2rem;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1rem;
      z-index: 2;
    }

    /* top bar */
    .mark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-soft);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .mark .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--terracotta);
      border-radius: 50%;
      margin: 0 0.45rem 0.1rem;
      vertical-align: middle;
      animation: pulse 2.4s ease-in-out infinite;
    }

    /* center frame */
    .frame {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 0.5rem;
    }

    .viewfinder {
      position: absolute;
      width: min(88vw, 920px);
      height: min(72vh, 580px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      animation: fadeIn 1.2s 0.1s forwards;
    }

    .corner {
      position: absolute;
      width: 38px;
      height: 38px;
      border: 1.5px solid var(--ink);
    }
    .corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
    .corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; }
    .corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
    .corner.br { bottom: 0; right: 0; border-left: none; border-top: none; }

    .content {
      position: relative;
      text-align: center;
      max-width: 720px;
      z-index: 3;
    }

    .pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.3s forwards;
    }

    .name {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(3.6rem, 11.5vw, 8.5rem);
      line-height: 0.9;
      letter-spacing: -0.025em;
      color: var(--ink);
      font-variation-settings: "SOFT" 100, "opsz" 144;
      opacity: 0;
      animation: fadeUp 1.1s 0.5s forwards;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0 1.75rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.8s forwards;
    }

    .divider .line {
      width: 48px;
      height: 1px;
      background: var(--muted);
    }

    .divider .star {
      font-size: 0.9rem;
      color: var(--terracotta);
      animation: spin 14s linear infinite;
    }

    .tagline {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: clamp(0.98rem, 1.5vw, 1.15rem);
      color: var(--ink-soft);
      line-height: 1.7;
      max-width: 460px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 0.8s 0.95s forwards;
    }

    .tagline em {
      font-style: italic;
      color: var(--ink);
    }

    /* footer */
    .foot {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: end;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.9s 1.15s forwards;
    }

    .foot span:nth-child(1) { text-align: left; }
    .foot span:nth-child(2) { text-align: center; }
    .foot span:nth-child(3) { text-align: right; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    @media (max-width: 640px) {
      .stage { padding: 1.25rem 1.25rem; }
      .viewfinder { width: 92vw; height: 76vh; }
      .corner { width: 24px; height: 24px; }
      .mark, .foot { font-size: 0.6rem; letter-spacing: 0.18em; }
      .divider .line { width: 32px; }
      .foot { gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <header class="mark">
      <span>EG<span class="dot"></span>Photography</span>
      <span>Est. MMXXVI</span>
    </header>

    <section class="frame">
      <div class="viewfinder" aria-hidden="true">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
      </div>

      <div class="content">
        <p class="pre">A Photographer's Portfolio</p>
        <h1 class="name">emily<br />gonzalez</h1>
        <div class="divider" aria-hidden="true">
          <span class="line"></span>
          <span class="star">✶</span>
          <span class="line"></span>
        </div>
        <p class="tagline">
          Mexican-American, studying <em>international relations</em> at Stanford.
          A photographer of <em>fashion</em>, <em>culture</em>, and <em>motion</em>.
        </p>
      </div>
    </section>

    <footer class="foot">
      <span>Issue N° 01</span>
      <span>Portfolio · Arriving Soon</span>
      <span>Stanford, CA</span>
    </footer>
  </main>
</body>
</html>
